<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="edit.css">
    <title>Edit profile</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <script type="module" src="edit.js"></script>


</head>
<body>
    <!--Nav bar-->
    <nav class="navbar">

        <a class="logo">
            <img src="/images/logo.png" alt="Logo">
        </a>
        
        <div class="links">
            <a href="/pages/CreateActivity/create.html">Create Activity</a>
            <a href="/pages/ActivityBrowser/browser.html">Browse Activities</a>
            <a href="/pages/Friends/friend.html">Friends</a>
            <a href="/pages/Profile/profile.html">Profile</a>
        
        </div>
    </nav>

    <!--Edit Section-->
    <div class="EditProfile">
        <h1>Edit Profile</h1>

        <div class="EditSection">
            <div class="col1">

                <!-- Name -->
                <label>Name</label>
                <input type="text" placeholder="Enter your name">

                <!-- About -->
                <label>About</label>
                <textarea placeholder="Write something about yourself..." maxlength="100"></textarea>
            </div>

            <div class="col2">
                <label>Telegram Handle</label>
                <input type="text">

                 <!-- Residence -->
                <label>Residences</label>
                <select name="Residence" id="Residence">

                    <option value="">Select your residence</option>
                    <option>NIL</option>

                    <!-- Halls -->
                    <optgroup label="Halls of Residence">

                        <option>Eusoff Hall</option>
                        <option>Kent Ridge Hall</option>
                        <option>King Edward VII Hall</option>
                        <option>Raffles Hall</option>
                        <option>Sheares Hall</option>
                        <option>Temasek Hall</option>

                    </optgroup>

                    <!-- Houses -->
                    <optgroup label="Houses">

                        <option>Helix House</option>
                        <option>Lighthouse House</option>
                        <option>Pioneer House</option>
                        <option>Valour House</option>

                    </optgroup>

                    <!-- Residential Colleges -->
                    <optgroup label="Residential Colleges">

                        <option>NUS College Residences</option>
                        <option>College of Alice & Peter Tan (CAPT)</option>
                        <option>Residential College 4 (RC4)</option>
                        <option>Ridge View Residential College (RVRC)</option>
                        <option>Tembusu College</option>
                        <option>Acacia College</option>

                    </optgroup>

                    <!-- Student Residences -->
                    <optgroup label="Student Residences">

                        <option>Prince George’s Park Residences (PGPR)</option>
                        <option>UTown Residence</option>

                    </optgroup>

                </select>

                <!--year of study -->
                <label>Year of study</label>
                <select name="Year" id="Year">
                    <option>Year 1</option>
                    <option>Year 2</option>
                    <option>Year 3</option>
                    <option>Year 4</option>
                    <option>Graduate</option>
                    <option>Prefer not to say</option>
                </select>
            </div>

            <div class="col3">
                <!-- Course -->
                <label>Course</label>

                <select name="Majors" id="Major">

                    <option value="">Select your major</option>

                    <option>Computing</option>
                    <option>Business</option>
                    <option>Engineering</option>
                    <option>Sciences</option>
                    <option>Humanities and Social Sciences</option>
                    <option>Medicine</option>
                    <option>Law</option>
                    <option>Prefer not to say</option>

                </select>
                
                <!--Interests-->
                <label>Interests</label>
                <div class="interests">
                    <button type="button">Technology</button>
                    <button type="button" >Gaming</button>
                    <button type="button">Sports</button>
                    <button type="button">Music</button>
                    <button type="button">Arts and Culture</button>
                    <button type="button">Film and TV</button>
                    <button type="button">Food</button>
                    <button type="button">Travel</button>
                    <button type="button">Fashion</button>
                    <button type="button">Science</button>
                    <button type="button">Nature</button>
                    <button type="button">Volunteering</button>
                    <button type="button">Others</button>
                    <!--<p id="check">Selected: </p>-->
                </div>
           
            </div>

        </div>
        <button class="save">Save</button>
    </div>

</body>
</html>
