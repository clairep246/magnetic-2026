<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="edit.css">
    <title>Edit profile</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <script type="module" src="edit.js"></script>
</head>
<body>
    <!--Nav Bar-->
    <nav class="navbar">

        <a class="logo">
            <img src="/images/logo.png" alt="Logo">
        </a>

        <div class="links">
            <div class="dropDown">
                <a>Recommend Me</a>
                <div class="dropDownContent">
                    <a href="/pages/ReccActivity/reccAct.html">Recommend an activity</a>
                    <a href="/pages/RecommendFriends/recommendF.html">Recommend users</a>
                </div>
            </div>
            <a href="/pages/ActivityBrowser/browser.html">Browse Activities</a>
             <div class="dropDown">
                <a>Your activities</a>
                <div class="dropDownContent">
                    <a href="/pages/CreateActivity/create.html">Create an activity</a>
                    <a href="/pages/ActivityPage/activity.html">Your created activities</a>
                </div>
            </div>
            <a href="/pages/Friends/friend.html">Friends</a>
            <a href="/pages/Profile/profile.html">Profile</a>

            <div class="dropDown">
                <a>Setting</a>
                <div class="dropDownContent">
                    <a style="text-decoration: underline;">Edit profile</a>
                    <a id="change" >Change Password</a>
                    <a id="signout">Sign out</a>
                </div>

            </div>
        </div>
    </nav>

    <!--Change password-->
    <div id="changeEmailPassword" class="popup">
        <div class="popupContent">
            <span class="close" id="close">&times;</span>
            <h2 style="text-align: center;">Change Password</h2>

            <input type="password" id="newPassword" placeholder="Enter new password">
            <input type="password" id="confirmPassword" placeholder="Confirm new password">

            <button id="saveBtn" type="button">Save</button>
        </div>
    </div>


    <!--Edit Section-->
    <div class="EditProfile">
        <h1>Edit Profile</h1>

        <div class="EditSection">
            <div class="col1">

                <!-- Name -->
                <label>Name</label>
                <input id="name" type="text" placeholder="Enter your name">

                <!-- About -->
                <label>About</label>
                <textarea id="about" placeholder="Write something about yourself..." maxlength="1000"></textarea>
            </div>

            <div class="col2">
                <label>Telegram Handle</label>
                <input id="telegramHandle" type="text">

                 <!-- Residence -->
                <label>Residences</label>
                <select name="Residence" id="residence">

                    <option value="">Select your residence</option>
                    <option>NIL</option>

                    <!-- Halls -->
                    <optgroup label="Halls of Residence">

                        <option>Eusoff Hall</option>
                        <option>Kent Ridge Hall</option>
                        <option>King Edward VII Hall</option>
                        <option>Raffles Hall</option>
                        <option>Sheares Hall</option>
                        <option>Temasek Hall</option>

                    </optgroup>

                    <!-- Houses -->
                    <optgroup label="Houses">

                        <option>Helix House</option>
                        <option>Lighthouse House</option>
                        <option>Pioneer House</option>
                        <option>Valour House</option>

                    </optgroup>

                    <!-- Residential Colleges -->
                    <optgroup label="Residential Colleges">

                        <option>NUS College Residences</option>
                        <option>College of Alice & Peter Tan (CAPT)</option>
                        <option>Residential College 4 (RC4)</option>
                        <option>Ridge View Residential College (RVRC)</option>
                        <option>Tembusu College</option>
                        <option>Acacia College</option>

                    </optgroup>

                    <!-- Student Residences -->
                    <optgroup label="Student Residences">

                        <option>Prince George’s Park Residences (PGPR)</option>
                        <option>UTown Residence</option>

                    </optgroup>

                </select>

                <!--year of study -->
                <label>Year of study</label>
                <select name="Year" id="year">
                    <option>Year 1</option>
                    <option>Year 2</option>
                    <option>Year 3</option>
                    <option>Year 4</option>
                    <option>Graduate</option>
                    <option>Prefer not to say</option>
                </select>
            </div>

            <div class="col3">
                <!-- Course -->
                <label>Course</label>

                <select name="Majors" id="major">

                    <option value="">Select your major</option>

                    <option>Computing</option>
                    <option>Business</option>
                    <option>Engineering</option>
                    <option>Sciences</option>
                    <option>Humanities and Social Sciences</option>
                    <option>Medicine</option>
                    <option>Law</option>
                    <option>Prefer not to say</option>

                </select>
                
                <!--Interests-->
                <label>Interests (max 3)</label>
                <div class="interests">
                    <input type="checkbox" id="sports-fitness" name="interests" value="Sports & Fitness">
                    <label for="sports-fitness"> Sports & Fitness</label><br>

                    <input type="checkbox" id="gaming" name="interests" value="Gaming">
                    <label for="gaming"> Gaming</label><br>

                    <input type="checkbox" id="technology" name="interests" value="Technology">
                    <label for="technology"> Technology</label><br>

                    <input type="checkbox" id="arts-crafts" name="interests" value="Arts & Crafts">
                    <label for="arts-crafts"> Arts & Crafts</label><br>

                    <input type="checkbox" id="music" name="interests" value="Music">
                    <label for="music"> Music</label><br>

                    <input type="checkbox" id="entertainment" name="interests" value="Entertainment">
                    <label for="entertainment"> Entertainment</label><br>

                    <input type="checkbox" id="learning-knowledge" name="interests" value="Learning & Knowledge">
                    <label for="learning-knowledge"> Learning & Knowledge</label><br>

                    <input type="checkbox" id="business-career" name="interests" value="Business & Career">
                    <label for="business-career"> Business & Career</label><br>

                    <input type="checkbox" id="food-cooking" name="interests" value="Food & Cooking">
                    <label for="food-cooking"> Food & Cooking</label><br>

                    <input type="checkbox" id="travel-outdoors" name="interests" value="Travel & Outdoors">
                    <label for="travel-outdoors"> Travel & Outdoors</label><br>

                    <input type="checkbox" id="lifestyle" name="interests" value="Lifestyle">
                    <label for="lifestyle"> Lifestyle</label><br>

                    <input type="checkbox" id="social-activities" name="interests" value="Social Activities">
                    <label for="social-activities"> Social Activities</label><br>

                    <input type="checkbox" id="community-service" name="interests" value="Community Service">
                    <label for="community-service"> Community Service</label><br>
                </div>
            </div>

        </div>
        <button class="save" id="save">Save</button>
    </div>

</body>
</html>
