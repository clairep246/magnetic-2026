<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="activity.css">
    <title>Your activities</title>
    <script type="module" src="activity.js"></script>
</head>
<body>
    <!--Nav Bar-->
    <nav class="navbar">

        <a class="logo">
            <img src="/images/logo.png" alt="Logo">
        </a>

        <div class="links">
            <div class="dropDown">
                <button>Recommend Me</button>
                <div class="dropDownContent">
                    <a href="/pages/ReccActivity/reccAct.html">Recommend an activity</a>
                    <a href="/pages/RecommendFriends/recommendF.html">Recommend users</a>
                </div>
            </div>
            <a href="/pages/ActivityBrowser/browser.html">Browse Activities</a>
             <div class="dropDown">
                <button>Your activities</button>
                <div class="dropDownContent">
                    <a href="/pages/CreateActivity/create.html">Create an activity</a>
                    <a style="text-decoration: underline;">Your created activities</a>
                </div>
            </div>
            <a href="/pages/Friends/friend.html">Friends</a>
            <a href="/pages/Profile/profile.html">Profile</a>

            <div class="dropDown">
                <button>Setting</button>
                <div class="dropDownContent">
                    <a href="/pages/EditProfile/edit.html">Edit profile</a>
                    <a id="change" >Change Password</a>
                    <a id="signout">Sign out</a>
                </div>

            </div>
        </div>
    </nav>

    <!--Change password-->
    <div id="changeEmailPassword" class="popup">
        <div class="popupContent">
            <span class="close" id="close">&times;</span>
            <h2 style="text-align: center;">Change Password</h2>

            <input type="password" id="newPassword" placeholder="Enter new password">
            <input type="password" id="confirmPassword" placeholder="Confirm new password">

            <button id="saveBtn" type="button">Save</button>
        </div>
    </div>


    <div class="activityPage">
        <h1> Your created activities</h1>
         <div class="activityContainer" id="activityContainer">
            </div>
        <div class="buttons">
            <button id="prevButton" type="button">🡰</button>
            <button id="nextButton" type="button">🡲</button>
        </div>
    </div>
   
   <div id="participantsModal" class="participantsModal">

    <div class="participantsContent">

        <div class="participantsHeader">
            <h2>Participants</h2>
            <span id="closeParticipants">&times;</span>
        </div>

        <div id="participantsList">

        </div>

    </div>

</div>

</body>
</html>
