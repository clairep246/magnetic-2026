<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="activity.css">
    <title>Title</title>
    <script type="module" src="activity.js"></script>
</head>
<body>
    <!--Nav Bar-->
    <nav class="navbar">

        <a href="/" class="logo">
