<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="signup.css">
    <link href="https://googleapis.com" rel="stylesheet">
    <script type="module" src="./signup.js"></script>
    <title>Login / Signup</title>
</head>

<body>
    <div class="Signup">

        <!--Left-->
        <div class="Left">
            <div class="box">
                <img src="/images/logo.png">
                <h1>Welcome!</h1>
                <p class="subtitle">Please fill in your details</p>

                <form id="signupForm">
                    <input type="name" placeholder="Name" id="name">
                    <input type="email" placeholder="Email" id="email">
                    <input type="password" placeholder="Password" id="password">

                    <button type="button" id="signUp">Create Account</button>
                </form>

                <p class="switch-page">
                    Have an account?
                    <a href="/pages/Login/login.html">Sign in</a>
                </p>

            </div>
        </div>

        <!--Right-->
        <div class="Right">
            <img src="/images/dancing.png">
        </div>
    </div>
</body>
</html>
