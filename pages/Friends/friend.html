<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="friend.css">
    <title>Friends</title>
    <script type="module" src="friend.js"></script>
</head>
<body>
   <!--Nav Bar-->
    <nav class="navbar">

        <a class="logo">
            <img src="/images/logo.png" alt="Logo">
        </a>

        <div class="links">
            <div class="dropDown">
                <a>Recommend Me</a>
                <div class="dropDownContent">
                    <a href="/pages/ReccActivity/reccAct.html">Recommend an activity</a>
                    <a href="/pages/RecommendFriends/recommendF.html">Recommend users</a>
                </div>
            </div>
            <a href="/pages/ActivityBrowser/browser.html">Browse Activities</a>
             <div class="dropDown">
                <a>Your activities</a>
                <div class="dropDownContent">
                    <a href="/pages/CreateActivity/create.html">Create an activity</a>
                    <a href="/pages/ActivityPage/activity.html">Your created activities</a>
                </div>
            </div>
            <a href="/pages/Friends/friend.html">Friends</a>
            <a href="/pages/Profile/profile.html">Profile</a>

            <div class="dropDown">
                <a>Setting</a>
                <div class="dropDownContent">
                    <a style="text-decoration: underline;">Edit profile</a>
                    <a id="change" >Change Password</a>
                    <a id="signout">Sign out</a>
                </div>

            </div>
        </div>
    </nav>

      <!--Change password-->
    <div id="changeEmailPassword" class="popup">
        <div class="popupContent">
            <span class="close" id="close">&times;</span>
            <h2 style="text-align: center;">Change Password</h2>

            <input type="password" id="newPassword" placeholder="Enter new password">
            <input type="password" id="confirmPassword" placeholder="Confirm new password">

            <button id="saveBtn" type="button">Save</button>
        </div>
    </div>

    <!--Friends List Section-->
    <div class="heading-row">
        <h2 class="friends-title">Friends</h2>
        <h2 class="add-friends">Add Friends</h2>
    </div>

    <div class="all-content">

        <div class="friends-list" id="friends-container"></div>

        <div class="right-panel">
            <div class="add-friends-box">

                <p class="your-code-label"> 
                Your Code 
                </p>
                <p id="friend-code-display">Loading...</p>
                <p class="enter-code-label"> 
                    Enter Friend Code: 
                </p>

                <input 
                    type="text"
                    id="friend-code-input">
        
                <div class="add-cancel-buttons">
                    <button class="add-friend-button">
                        Send Request
                    </button>

                    <button class="cancel-button">
                        Cancel
                    </button>
                </div>
            </div>
       
         <div class="friend-requests">
            <h3>Friend Requests</h3>

            <div id="requests-container"></div>
        </div>
        
        </div>
       
        </div>
    </div>


    
</body>
</html>
