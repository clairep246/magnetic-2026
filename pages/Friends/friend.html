<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="friend.css">
    <title>Friends</title>
    <script type="module" src="friend.js"></script>
</head>
<body>
    <!--Nav Bar-->
    <nav class="navbar">

        <a class="logo">
            <img src="/images/logo.png" alt="Logo">
        </a>

        <div class="links">
            <a href="/pages/CreateActivity/create.html">Create Activity</a>
            <a href="/pages/ActivityBrowser/browser.html">Browse Activities</a>
            <a href="/pages/ActivityPage/activity.html">Your Activities</a>
            <a style="text-decoration: underline;">Friends</a>
            <a href="/pages/Profile/profile.html">Profile</a>
            <a id="signout">Sign out</a>
       
        </div>
    </nav>

    <!--Friends List Section-->
    <div class="heading-row">
        <h2 class="friends-title">Friends</h2>
        <h2 class="add-friends">Add Friends</h2>
    </div>

    <div class="all-content">

        <div class="friends-list" id="friends-container"></div>

        <div class="right-panel">
            <div class="add-friends-box">

                <p class="your-code-label"> 
                Your Code 
                </p>
                <p id="friend-code-display">Loading...</p>
                <p class="enter-code-label"> 
                    Enter Friend Code: 
                </p>

                <input 
                    type="text"
                    id="friend-code-input">
        
                <div class="add-cancel-buttons">
                    <button class="add-friend-button">
                        Send Request
                    </button>

                    <button class="cancel-button">
                        Cancel
                    </button>
                </div>
            </div>
       
         <div class="friend-requests">
            <h3>Friend Requests</h3>

            <div id="requests-container"></div>
        </div>
        
        </div>
       
        </div>
    </div>


    
</body>
</html>
