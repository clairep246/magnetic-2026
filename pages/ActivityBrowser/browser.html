<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="browser.css">
    <title>Browse Activities</title>
    <script type="module" src="browser.js"></script>
</head>
<body>
    <!--Nav Bar-->
    <nav class="navbar">

        <a class="logo">
            <img src="/images/logo.png" alt="Logo">
        </a>

        <div class="links">
            <div class="dropDown">
                <button>Recommend Me</button>
                <div class="dropDownContent">
                    <a href="/pages/ReccActivity/reccAct.html">Recommend an activity</a>
                    <a href="/pages/RecommendFriends/recommendF.html">Recommend users</a>
                </div>
            </div>
            <a style="text-decoration: underline;">Browse Activities</a>
             <div class="dropDown">
                <button>Your activities</button>
                <div class="dropDownContent">
                    <a href="/pages/CreateActivity/create.html">Create an activity</a>
                    <a href="/pages/ActivityPage/activity.html">Your created activities</a>
                </div>
            </div>
            <a href="/pages/Friends/friend.html">Friends</a>
            <a href="/pages/Profile/profile.html">Profile</a>

            <div class="dropDown">
                <button>Setting</button>
                <div class="dropDownContent">
                    <a href="/pages/EditProfile/edit.html">Edit profile</a>
                    <a id="change" >Change Password</a>
                    <a id="signout">Sign out</a>
                </div>

            </div>
        </div>
    </nav>

    <!--Change password-->
    <div id="changeEmailPassword" class="popup">
        <div class="popupContent">
            <span class="close" id="close">&times;</span>
            <h2 style="text-align: center;">Change Password</h2>

            <input type="password" id="newPassword" placeholder="Enter new password">
            <input type="password" id="confirmPassword" placeholder="Confirm new password">

            <button id="saveBtn" type="button">Save</button>
        </div>
    </div>


    <!--Activity browser section-->
<div class="activityPage">

    <div class="header">
        <div class="headerText">
             <h2>Browse Activities</h2>
            <p>Discover and join activities that match your interests.</p>
        </div>
       
        <div class="modeContainer">
                <button id="allActivities" class="modeBtn active">
                    All Activities
                </button>

                <button id="joinedActivities" class="modeBtn">
                    Joined Activities
                </button>
            </div>
    </div>

    <div class="browserLayout">

        <!-- Left Filter -->
        <div class="filterPanel">

            <h3>Filter Activities</h3>

            <div class="filterList">
                <h4>Interest</h4>

                <label><input type="checkbox" value="Sports & Fitness"> 🏀 Sports & Fitness</label>
                <label><input type="checkbox" value="Gaming"> 🎮 Gaming</label>
                <label><input type="checkbox" value="Technology"> 💻 Technology</label>
                <label><input type="checkbox" value="Arts & Crafts"> 🎨 Arts & Crafts</label>
                <label><input type="checkbox" value="Music"> 🎵 Music</label>
                <label><input type="checkbox" value="Entertainment"> 🎬 Entertainment</label>
                <label><input type="checkbox" value="Learning & Knowledge"> 📚 Learning & Knowledge</label>
                <label><input type="checkbox" value="Business & Career"> 💼 Business & Career</label>
                <label><input type="checkbox" value="Food & Cooking"> 🍜 Food & Cooking</label>
                <label><input type="checkbox" value="Travel & Outdoors"> 🏕️ Travel & Outdoors</label>
                <label><input type="checkbox" value="Lifestyle"> 🌿 Lifestyle</label>
                <label><input type="checkbox" value="Social Activities"> 🥳 Social Activities</label>
                <label><input type="checkbox" value="Community service"> 🤝 Community Service</label>
            </div>

            <button id="clearFilter">Clear Filters</button>

        </div>

        <hr>
        <!-- Right Content -->
        <div class="activityContent">
            

            <div class="activityContainer" id="activityContainer">
            </div>

            <div class="buttons">
                <button id="prevButton">🡰</button>
                <button id="nextButton">🡲</button>
            </div>

        </div>

    </div>

</div>
</body>
</html>
